<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Chronicle — Personal media tracker for Anime, Manhwa, Donghua, and Light Novels."
    />
    <meta name="theme-color" content="#050507" />
    <link rel="icon" type="image/svg+xml" href="/icon.png" />
    <title>Chronicle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>

  <body>
    <div id="app"></div>

    <input
      type="file"
      id="import-file"
      accept=".json,.csv,.xlsx,.xls"
      style="display: none"
    />

    <dialog id="media-modal" aria-labelledby="modal-title">
      <form id="media-form" method="dialog">
        <div class="modal-header">
          <h2 id="modal-title">Add Entry</h2>
        </div>
        <div class="modal-body">
          <input type="hidden" id="media-id" />

          <!-- Title + Lookup -->
          <div class="form-group">
            <label for="media-title">Title</label>
            <div class="title-row">
              <input
                type="text"
                id="media-title"
                placeholder="e.g. Return of the Mount Hua Sect"
                required
              />
              <button
                type="button"
                id="btn-anime-lookup"
                class="btn-secondary"
                title="Fetch metadata from AniList/MAL"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                Lookup
              </button>
            </div>
            <div id="lookup-hint" class="lookup-hint">
              Use lookup to auto-fill title and total episodes/chapters.
            </div>
            <div
              id="lookup-suggestions"
              class="lookup-suggestions"
              role="listbox"
              aria-label="Lookup suggestions"
              hidden
            ></div>
          </div>

          <!-- Type + Status -->
          <div class="row">
            <div class="form-group">
              <label for="media-type">Type</label>
              <select id="media-type" required>
                <option value="Anime">Anime</option>
                <option value="Manhwa">Manhwa</option>
                <option value="Donghua">Donghua</option>
                <option value="Light Novel">Light Novel</option>
              </select>
            </div>
            <div class="form-group">
              <label for="media-status">Status</label>
              <select id="media-status" required>
                <option value="Watching/Reading">Watching/Reading</option>
                <option value="Planned">Planned</option>
                <option value="On Hold">On Hold</option>
                <option value="Dropped">Dropped</option>
                <option value="Completed">Completed</option>
              </select>
            </div>
          </div>

          <!-- Progress + Rating in one row -->
          <div class="modal-inline-row">
            <div class="form-group">
              <label for="media-progress-current">Current</label>
              <input
                type="number"
                id="media-progress-current"
                min="0"
                value="0"
                placeholder="0"
              />
            </div>
            <div class="form-group">
              <label for="media-progress-total">Total</label>
              <input
                type="number"
                id="media-progress-total"
                min="0"
                value="0"
                placeholder="0"
              />
            </div>
            <div class="form-group">
              <label for="media-rating">Rating</label>
              <input
                type="number"
                id="media-rating"
                min="0"
                max="10"
                placeholder="0–10"
              />
            </div>
          </div>

          <!-- URLs -->
          <div class="form-group">
            <label for="media-read-url"
              >Read URL <small style="opacity: 0.5">(optional)</small></label
            >
            <input
              type="url"
              id="media-read-url"
              placeholder="https://asurascans.com/..."
              autocomplete="off"
            />
          </div>

          <div class="form-group">
            <label for="media-tracker-url"
              >Tracker URL
              <small style="opacity: 0.5">(notifications)</small></label
            >
            <input
              type="url"
              id="media-tracker-url"
              placeholder="https://asurascans.com/manga/..."
              autocomplete="off"
            />
          </div>

          <!-- Notes -->
          <div class="form-group">
            <label for="media-notes">Notes</label>
            <textarea
              id="media-notes"
              rows="2"
              placeholder="Inscribe your thoughts..."
            ></textarea>
          </div>

          <!-- Thumbnail Overrides -->
          <details class="thumbnail-overrides">
            <summary>Thumbnail Overrides</summary>
            <div class="form-group" style="margin-top: 12px">
              <label for="media-mangadex-id"
                >MangaDex ID <small style="opacity: 0.5">(Manhwa)</small></label
              >
              <input
                type="text"
                id="media-mangadex-id"
                placeholder="UUID"
                autocomplete="off"
              />
            </div>
            <div class="form-group">
              <label for="media-custom-cover-url"
                >Custom Image URL
                <small style="opacity: 0.5">(Manual)</small></label
              >
              <input
                type="url"
                id="media-custom-cover-url"
                placeholder="https://..."
                autocomplete="off"
              />
            </div>
          </details>
        </div>
        <div class="modal-actions">
          <button
            type="button"
            class="btn-cancel"
            onclick="document.getElementById('media-modal').close()"
          >
            Cancel
          </button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </dialog>

    <dialog
      id="confirm-dialog"
      aria-labelledby="confirm-title"
      class="dialog-sm"
    >
      <div class="modal-header">
        <h3 id="confirm-title">Erase record?</h3>
      </div>
      <div class="modal-body">
        <p id="confirm-message">This action cannot be undone.</p>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" id="confirm-cancel">
          Cancel
        </button>
        <button type="button" class="btn-danger" id="confirm-ok">Erase</button>
      </div>
    </dialog>

    <dialog
      id="export-type-dialog"
      aria-labelledby="export-type-title"
      class="dialog-sm"
    >
      <div class="modal-header">
        <h3 id="export-type-title">Export Archives</h3>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="export-type-media">Media Type</label>
          <select id="export-type-media">
            <option value="Anime">Anime</option>
            <option value="Manhwa">Manhwa</option>
            <option value="Donghua">Donghua</option>
            <option value="Light Novel">Light Novel</option>
          </select>
        </div>
        <div class="form-group">
          <label for="export-type-format">Format</label>
          <select id="export-type-format">
            <option value="csv">CSV</option>
            <option value="xlsx">Excel (.xlsx)</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" id="export-type-cancel">
          Cancel
        </button>
        <button type="button" class="btn-primary" id="export-type-confirm">
          Export
        </button>
      </div>
    </dialog>

    <dialog
      id="settings-modal"
      aria-labelledby="settings-title"
      class="dialog-sm"
    >
      <form id="settings-form" method="dialog">
        <div class="modal-header">
          <h3 id="settings-title">User Settings</h3>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="settings-telegram-id">Telegram Chat ID</label>
            <input
              type="text"
              id="settings-telegram-id"
              placeholder="Enter your numeric chat ID"
            />
          </div>
          <div class="form-group settings-toggle-group">
            <div class="settings-toggle-header">
              <label for="settings-notifications">Notifications</label>
              <span
                id="settings-notifications-state"
                class="settings-toggle-state"
                data-state="off"
                >Off</span
              >
            </div>
            <label
              for="settings-notifications"
              class="settings-toggle"
              aria-label="Toggle notifications"
            >
              <input type="checkbox" id="settings-notifications" />
              <span class="settings-toggle-track" aria-hidden="true">
                <span class="settings-toggle-thumb"></span>
              </span>
              <span class="settings-toggle-copy">
                Enable Telegram update alerts
              </span>
            </label>
          </div>
        </div>
        <div class="modal-actions">
          <button
            type="button"
            class="btn-cancel"
            onclick="document.getElementById('settings-modal').close()"
          >
            Cancel
          </button>
          <button type="submit" class="btn-primary" id="settings-save">
            Save changes
          </button>
        </div>
      </form>
    </dialog>

    <div id="toast-container" aria-live="polite"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
